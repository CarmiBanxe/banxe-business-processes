# Sanctions Screening
archimate_id: id-sanctions-screening-process
type: BusinessProcess
domain: compliance
name: Sanctions Screening
documentation: |
  OFAC/UN/EU/UK sanctions and PEP check. Triggered at onboarding and on each payment. MLR 2017 Reg.28.
relationships:
  - name: Banxe Screener
    type: ApplicationComponent
    relation: Composition

process_id: sanctions-screening-process
version: "1.0.0"
triggers:
  - "Customer onboarding"
  - "Each inbound/outbound payment"
steps:
  - "Extract the party data to screen"
  - "Screen against OFAC / UN / EU / UK sanctions lists"
  - "Run the PEP check"
  - "Evaluate potential matches"
  - "Escalate confirmed hits to the MLRO"
actors:
  - compliance-officer
  - mlro
compliance_refs:
  - "MLR-2017-Reg.28"
