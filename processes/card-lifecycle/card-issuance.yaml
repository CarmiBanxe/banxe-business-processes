# Card Issuance
archimate_id: id-card-issuance
type: BusinessProcess
domain: card-lifecycle
name: Card Issuance
documentation: |
  Virtual/physical card creation via Hyperswitch Card Vault. PCI DSS scope.
relationships:
  - name: Hyperswitch Card Vault
    type: ApplicationComponent
    relation: Composition

process_id: card-issuance
version: "1.0.0"
triggers:
  - "An approved customer requests a card"
steps:
  - "Validate customer eligibility"
  - "Create the card in the Hyperswitch Card Vault"
  - "Provision the PAN (PCI DSS scope)"
  - "Deliver the virtual or physical card"
actors:
  - card-operations
compliance_refs:
  - "PCI-DSS"
